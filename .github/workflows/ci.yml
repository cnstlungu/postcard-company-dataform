name: CI

on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]

jobs:
  dataform:
    name: Compile and test
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install Dataform CLI
        run: npm install -g @dataform/cli

      - name: Compile
        run: dataform compile

      - name: Test
        run: dataform test
